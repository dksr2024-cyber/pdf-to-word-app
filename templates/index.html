<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.title }}</title>
    <style>
        body { font-family: 'Khmer OS Battambang', Arial, sans-serif; text-align: center; padding: 30px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; position: relative; margin-bottom: 20px;}
        .btn { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; font-family: 'Khmer OS Battambang', Arial, sans-serif;}
        .btn:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .donation-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; }
        .qr-code { width: 200px; border-radius: 10px; margin-top: 10px; }
        .lang-switch { position: absolute; top: 15px; right: 20px; }
        .lang-switch a { text-decoration: none; font-weight: bold; padding: 5px 10px; border-radius: 5px; font-size: 14px;}
        .lang-switch a.active { background-color: #007bff; color: white; }
        .lang-switch a:not(.active) { background-color: #e9ecef; color: #333; }
        #loading-overlay { display: none; margin-top: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switch">
            <a href="/?lang=km" class="{% if current_lang == 'km' %}active{% endif %}">ខ្មែរ</a>
            <a href="/?lang=en" class="{% if current_lang == 'en' %}active{% endif %}">EN</a>
        </div>
        <h2>📄 {{ text.pdf_header }}</h2>
        <p>{{ text.instruction_pdf }}</p>
        <form class="uploadForm" action="/convert-pdf" enctype="multipart/form-data">
            <input type="hidden" name="lang" value="{{ current_lang }}">
            <input type="file" name="pdf_file" accept=".pdf" required>
            <br>
            <button type="submit" class="btn submitBtn">{{ text.convert_btn }}</button>
        </form>
    </div>

    <div class="container">
        <h2>🖼️ {{ text.img_header }}</h2>
        <p>{{ text.instruction_img }}</p>
        <form class="uploadForm" action="/convert-img" enctype="multipart/form-data">
            <input type="hidden" name="lang" value="{{ current_lang }}">
            <input type="file" name="image_file" accept="image/*" required>
            <br>
            <button type="submit" class="btn btn-success submitBtn">{{ text.convert_btn }}</button>
        </form>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">{{ text.loading }}</p>
    </div>

    <div class="container donation-section">
        <h3>{{ text.support_header }}</h3>
        <p>{{ text.support_text }}</p>
        <img src="{{ url_for('static', filename='aba_qr.jpg') }}" alt="ABA QR Code" class="qr-code">
        <p><strong>{{ text.account }}</strong> 000409692 (SVAY KRISNA)</p>
    </div>

    <script>
        document.querySelectorAll('.uploadForm').forEach(form => {
            form.addEventListener('submit', async function(e) {
                e.preventDefault(); 
                
                let btns = document.querySelectorAll('.submitBtn');
                let loading = document.getElementById('loading-overlay');
                
                btns.forEach(btn => btn.style.display = 'none');
                loading.style.display = 'block';

                let formData = new FormData(this);
                let actionUrl = this.getAttribute('action');

                try {
                    let response = await fetch(actionUrl, { method: 'POST', body: formData });
                    if (response.ok) {
                        let blob = await response.blob();
                        let url = window.URL.createObjectURL(blob);
                        let a = document.createElement('a');
                        a.href = url;
                        let fileInput = this.querySelector('input[type="file"]');
                        let originalName = fileInput.files[0].name;
                        a.download = originalName.replace(/\.[^/.]+$/, "") + ".docx"; 
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                    } else {
                        let errorText = await response.text();
                        alert(errorText ? errorText : "មានបញ្ហាពីខាង Server សូមពិនិត្យមើលឈ្មោះ ឬទំហំឯកសារ!");
                    }
                } catch (error) {
                    alert("មានបញ្ហាក្នុងការភ្ជាប់ទៅកាន់ Server សូមព្យាយាមម្តងទៀត!");
                }

                loading.style.display = 'none';
                btns.forEach(btn => btn.style.display = 'inline-block');
            });
        });
    </script>

</body>
</html>
